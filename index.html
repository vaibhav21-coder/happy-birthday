  <!-- ❤️ Floating Heart Cursor Script (restored and working) -->
  <script type="text/javascript">
  var colours = ['#ff3366', '#ff6699', '#ff33cc', '#ff99cc', '#ff66b2', '#ff0066']; 
  var minisize = 16; 
  var maxisize = 28; 
  var hearts = 66; 
  var over_or_under = "over"; 

  var x = ox = 400;
  var y = oy = 300;
  var swide = 800;
  var shigh = 600;
  var sleft = sdown = 0;
  var herz = [];
  var herzx = [];
  var herzy = [];
  var herzs = [];
  var kiss = false;

  if (typeof('addRVLoadEvent') != 'function') function addRVLoadEvent(funky) {
    var oldonload = window.onload;
    if (typeof(oldonload) != 'function') window.onload = funky;
    else window.onload = function() {
      if (oldonload) oldonload();
      funky();
    }
  }

  addRVLoadEvent(mwah);

  function mwah() { if (document.getElementById) {
    var i, heart;
    for (i = 0; i < hearts; i++) {
      heart = createDiv("auto", "auto");
      heart.style.visibility = "hidden";
      heart.style.zIndex = (over_or_under == "over") ? "1001" : "0";
      heart.style.color = colours[i % colours.length];
      heart.style.pointerEvents = "none";
      heart.style.opacity = 0.75;
      heart.appendChild(document.createTextNode(String.fromCharCode(9829)));
      document.body.appendChild(heart);
      herz[i] = heart;
      herzy[i] = false;
    }
    set_scroll();
    set_width();
    herzle();
  }}

  function herzle() {
    var c;
    if (Math.abs(x - ox) > 1 || Math.abs(y - oy) > 1) {
      ox = x;
      oy = y;
      for (c = 0; c < hearts; c++) if (herzy[c] === false) {
        herz[c].firstChild.nodeValue = String.fromCharCode(9829);
        herz[c].style.left = (herzx[c] = x - minisize / 2) + "px";
        herz[c].style.top = (herzy[c] = y - minisize) + "px";
        herz[c].style.fontSize = minisize + "px";
        herz[c].style.fontWeight = 'normal';
        herz[c].style.visibility = 'visible';
        herzs[c] = minisize;
        break;
      }
    }
    for (c = 0; c < hearts; c++) if (herzy[c] !== false) blow_me_a_kiss(c);
    setTimeout(herzle, 40);
  }

  document.onmousedown = pucker;
  document.onmouseup = function() { clearTimeout(kiss); };

  function pucker() {
    ox = -1;
    oy = -1;
    kiss = setTimeout(pucker, 100);
  }

  function blow_me_a_kiss(i) {
    herzy[i] -= herzs[i] / minisize + i % 2;
    herzx[i] += (i % 5 - 2) / 5;
    if (herzy[i] < sdown - herzs[i] || herzx[i] < sleft - herzs[i] || herzx[i] > sleft + swide - herzs[i]) {
      herz[i].style.visibility = "hidden";
      herzy[i] = false;
    }
    else if (herzs[i] > minisize + 2 && Math.random() < .5 / hearts) break_my_heart(i);
    else {
      if (Math.random() < maxisize / herzy[i] && herzs[i] < maxisize) herz[i].style.fontSize = (++herzs[i]) + "px";
      herz[i].style.top = herzy[i] + "px";
      herz[i].style.left = herzx[i] + "px";
    }
  }

  function break_my_heart(i) {
    herz[i].firstChild.nodeValue = String.fromCharCode(9676);
    herz[i].style.fontWeight = 'bold';
    herzy[i] = false;
    setTimeout(() => herz[i].style.visibility = "hidden", 400);
  }

  document.onmousemove = mouse;
  function mouse(e) {
    if (e) { y = e.pageY; x = e.pageX; }
    else { set_scroll(); y = event.y + sdown; x = event.x + sleft; }
  }

  window.onresize = set_width;
  function set_width() {
    var sw_min = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
    var sh_min = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
    swide = sw_min;
    shigh = sh_min;
  }

  window.onscroll = set_scroll;
  function set_scroll() {
    sdown = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    sleft = window.pageXOffset || document.documentElement.scrollLeft || document.body.scrollLeft || 0;
  }

  function createDiv(height, width) {
    var div = document.createElement("div");
    div.style.position = "absolute";
    div.style.height = height;
    div.style.width = width;
    div.style.overflow = "hidden";
    div.style.backgroundColor = "transparent";
    return div;
  }
  </script>
</head>

<body>
  <!-- 👇 Your entire original content (untouched) -->
  <!-- START -->
  <div id="wrapper">
    <div class="flag__birthday">

    <div class="decorate_star star1" style="--t: 15s;"></div>

    <div class="decorate_flower--one" style="--t: 15s;">
      <img width="20" src="images/decorate_flower.png" alt="">
    </div>
    <div class="decorate_flower--two" style="--t: 15.3s;">
      <img width="20" src="images/decorate_flower.png" alt="">
    </div>
    <div class="decorate_flower--three" style="--t: 15.6s;">
      <img width="20" src="images/decorate_flower.png" alt="">
    </div>

    <div class="decorate_bottom">
      <img src="images/decorate.png" alt="" width="100">
    </div>
    <div class="smiley__icon">
      <img src="images/smiley_icon.png" alt="" width="100">
    </div>

    <!-- Letter Box -->
    <div class="box__letter">
      <div class="letter__border">
        <div class="letter">
          <div class="title__letter"></div>
          <div class="content__letter">
            <div class="left">
              <img id="heart__letter" src="https://media0.giphy.com/media/c76IJLufpNwSULPk77/giphy.gif" alt="">
              <img class="heart heart_1" style="--t: 0.2s" width="20" src="images/heart.png" alt="">
              <img class="heart heart_2" style="--t: 0.4s" width="20" src="images/heart.png" alt="">
              <img class="heart heart_3" style="--t: 0.6s" width="20" src="images/heart.png" alt="">
              <img class="heart heart_4" style="--t: 0.8s" width="20" src="images/heart.png" alt="">
            </div>
            <div class="right">
              <div class="love__img">
                <img src="https://media4.giphy.com/media/W4jyjmIpnw6e38B6Qc/giphy.gif" alt="" width="220">
              </div>
              <div class="text__letter">
                <p></p>

              <img id="mewmew" width="80" src="images/mewmew.gif" alt="">

        <div class="close">

  <!-- Original script unchanged -->
  <script>
    let datetxt = "10 July 2008";
    let datatxtletter = `Happy Birthday! 🧿✨

Mujhe pata hai right now it’s exactly 12 AM, and your phone is probably blowing up with notifications, family calls, and stories. Everyone is wishing you, everyone is celebrating you. But among all that noise, I wanted to take a step back and write this down for you. You know me, main hamesha bohot zyada express nahi kar paata baaton mein, but today, I wanted to put my whole heart into words because you deserve nothing less than the absolute best on your special day.

To be honest, while writing this, I was looking back at life, and honestly, a lot has changed. Life moves so fast, and sometimes we get so caught up in our daily routines, our struggles, and our individual grinds that we forget to pause and look at the beautiful things we have. For me, that beautiful constant is you. Having you in my life has been one of the greatest blessings I could have ever asked for. Even though we are navigating this distance right now, and there are times when things get tough, the thought of you is what keeps me grounded. Distance makes things hard, bohot baar akelepan lagta hai, but deep down, your presence in my life acts like an anchor.

I want to take a moment to tell you how incredibly proud I am of you. Seeing you grow, watching you take steps to better yourself—like wanting to hit the gym, focusing on your well-being, and building your own identity—it genuinely inspires me. Main hamesha chahta hoon ki tum excel karo, life mein jo chaho wo achieve karo. Whenever I see you pushing your boundaries, mera dil sacche mann se khushi se bhar jaata hai. You have this quiet strength inside you that is so beautiful, and I hope you never forget that. You are capable of turning any storm into a calm sea, and I am so lucky to be the one standing by your side watching you conquer everything.

Aisa nahi hai ki humare beech kabhi insecurities nahi aati, ya hum stumble nahi karte. We are human, after all. Bohot baar emotions overwhelm kar dete hain, dimaag mein darr aata hai, but every single time I look at you, my trust in what we share completely silences that noise. It’s a very rare feeling to trust someone so deeply that even when the entire world feels chaotic, their thought brings instant peace to your soul. Whenever I close my eyes and think of our bond, I realize that what we have is special. It’s built on respect, on silence that speaks volumes, and a love that doesn't need to show off to the world to prove its existence. Tum mere liye sirf ek partner nahi ho, you are my safe space. Jab poori duniya thaka deti hai, tumse do baatein karke lagta hai ki haan, sab theek ho jayega.

I know sometimes I can get a bit quiet or get buried under my own work and goals, but please never think for a single second that you aren't on my mind. Every single day, my grind, my effort to make myself better—somewhere down the line, it’s all connected to the future I want to build. Ek hota hai temporary affection, aur ek hota hai silent dedication where you choose a person every single day, no matter how hard the day is. I choose you. Every single day, I choose you. Aur main tumse bas yahi chahta hoon ki tum bina kisi darr ke apni life jiyo, apne saare sapne poore karo, aur hamesha waisi hi raho jaisi tum ho—pure, real, and absolutely unmatched.

As you step into this new year of your life, my only prayer for you is absolute happiness and peace of mind. Main hamesha tumhare peeche ek deewar ki tarah khada rahoonga. Whenever you feel weak, whenever life gets a bit too heavy, just remember you have a man who respects you, adores you, and believes in you even when you find it hard to believe in yourself. Hum door hain physically, but emotionally, my heart beats right next to yours. I am holding down the fort here, and I know you are doing amazing things there.

Once again, a very, very Happy Birthday, my queen. Enjoy your day to the absolute fullest. Eat your favorite cake, smile until your cheeks hurt, and remember that somewhere far away, someone is smiling just thinking about your existence. You mean the world to me, and nothing will ever change that.

With all my heart, love, and respect,

Tutu 🧿🔥👑`;
    let titleLetter = "To you";
    let charArrDate = datetxt.split('');
    let charArrDateLetter = datatxtletter.split('');
    let charArrTitle = titleLetter.split('');
    let currentIndex = 0;
    let currentIndexLetter = 0;
    let currentIndexTitle = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");
    let text__letter = document.querySelector(".text__letter p");

    setTimeout(function(){
      timeDatetxt = setInterval(function(){
        if(currentIndex < charArrDate.length){
          date__of__birth.textContent += charArrDate[currentIndex];
          currentIndex++;
        } else {
          let i = document.createElement("i");
          i.className = "fa-solid fa-star";
          document.querySelector(".date__of__birth").prepend(i);
          document.querySelector(".date__of__birth").appendChild(i.cloneNode(true));
          clearInterval(timeDatetxt);
        }
      },100)
    },12000);

    var intervalContent;
    var intervalTitle;
    $("#btn__letter").on("click", function(){
      $(".box__letter").slideDown();
      setTimeout(function(){
        $(".letter__border").slideDown();
      },1000);
      setTimeout(function(){
        intervalTitle = setInterval(function(){
          if(currentIndexTitle < charArrTitle.length){
            document.querySelector(".title__letter").textContent += charArrTitle[currentIndexTitle];
            let i = document.createElement("i");
            i.className = "fa-solid fa-heart";
            document.querySelector(".title__letter").appendChild(i);
            currentIndexTitle++;
          } else {
            clearInterval(intervalTitle);
          }
        },100);
      },2000);
      setTimeout(function(){
        document.querySelector("#heart__letter").classList.add("animationOp");
        document.querySelector(".love__img").classList.add("animationOp");
        document.querySelector("#mewmew").classList.add("animationOp");
      },2800);
      setTimeout(function(){
        document.querySelectorAll(".heart").forEach((item)=>{
          item.classList.add("animation");
        })
      },3500);
      setTimeout(function(){
        intervalContent = setInterval(function(){
          if(currentIndexLetter < charArrDateLetter.length){
            let charsPerTick = 3;
            let chunk = charArrDateLetter.slice(currentIndexLetter, currentIndexLetter + charsPerTick).join('');
            text__letter.textContent += chunk;
            currentIndexLetter += charsPerTick;
            text__letter.parentElement.scrollTop = text__letter.parentElement.scrollHeight;
          } else {
            clearInterval(intervalContent);
          }
        },20);
      },6000);
    });

    $(".close").on("click", function(){
      clearInterval(intervalContent);
      document.querySelector(".title__letter").textContent = "";
      text__letter.textContent = "";
      currentIndexLetter = 0;
      currentIndexTitle = 0;
      document.querySelector("#heart__letter").classList.remove("animationOp");
      document.querySelector(".love__img").classList.remove("animationOp");
      document.querySelector("#mewmew").classList.remove("animationOp");
      document.querySelectorAll(".heart").forEach((item)=>{
        item.classList.remove("animation");
      });
      $(".box__letter").slideUp();
      $(".letter__border").slideUp();
    });
  </script>
